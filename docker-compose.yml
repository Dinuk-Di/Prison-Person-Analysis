version: '3.8'

services:
  backend:
    build:
      context: ./AI/prison_health_api
      dockerfile: Dockerfile
    ports:
      - "5010:5010"
    volumes:
      - ./AI/prison_health_api:/app
      - /app/venv
    environment:
      - FLASK_APP=run.py
      - FLASK_ENV=development
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      - VITE_BASE_URL=http://localhost:5010
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
