version: '3.8'

services:
  backend:
    build:
      context: ./AI/prison_health_api
      dockerfile: Dockerfile
    ports:
      - "5010:5010"
    volumes:
      - ./AI/prison_health_api:/app
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=1
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3610:3610"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BASE_URL=http://localhost:5010
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
